name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Lint · Typecheck · Test · Publish
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx nx run-many -t lint

      - name: Typecheck
        run: npx nx run-many -t typecheck

      - name: Test
        run: npx nx run-many -t test

      - name: Stamp version from tag
        run: npm pkg set version=${GITHUB_REF_NAME#v} --prefix apps/cli

      - name: Build CLI + Web UI
        run: npx nx run cli:copy-ui

      - name: Copy package.json and README to dist
        run: |
          cp apps/cli/package.json dist/apps/cli/package.json
          cp README.md dist/apps/cli/README.md

      - name: Publish to npm
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          if [[ "$VERSION" == *-* ]]; then
            npm publish --access public --tag next
          else
            npm publish --access public
          fi
        working-directory: dist/apps/cli
